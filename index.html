<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title❤TE AMO❤</title>

        <style>
            body {
                margin: 0;
                overflow: hidden;
                background: black;
                font-family: Arial;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                color: white;
            }
            
            .heart {
                position: relative;
                width: 200px;
                height: 180px;
                transform: rotate(-45deg);
                animation: beat 1.2s infinite;
            }
            
            .heart:before,
            .heart:after {
                content: "";
                position: absolute;
                width: 200px;
                height: 180px;
                background: red;
                border-radius: 50%;
            }
            
            .heart:before {
                top: -100px;
                left: 0;
            }
            
            .heart:after {
                left: 100px;
                top: 0;
            }
            
            .text {
                position: absolute;
                transform: rotate(45deg);
                width: 100%;
                height: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 28px;
                font-weight: bold;
                text-shadow: 0 0 20px white;
            }
            
            @keyframes beat {
                0% {
                    transform: rotate(-45deg) scale(1);
                }
                50% {
                    transform: rotate(-45deg) scale(1.1);
                }
                100% {
                    transform: rotate(-45deg) scale(1);
                }
            }
            
            canvas {
                position: absolute;
                top: 0;
                left: 0;
                z-index: -1;
            }
        </style>
</head>

<body>

    <canvas id="particles"></canvas>

    <div class="heart">
        <div class="text">TE AMO MINHA VIDA </div>
    </div>

    <script>
        const canvas = document.getElementById("particles")
        const ctx = canvas.getContext("2d")

        canvas.width = window.innerWidth
        canvas.height = window.innerHeight

        let particles = []

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width
                this.y = Math.random() * canvas.height
                this.size = Math.random() * 3
                this.speedX = (Math.random() - 0.5) * 2
                this.speedY = (Math.random() - 0.5) * 2
                this.color = `hsl(${Math.random()*360},100%,60%)`
            }

            update() {
                this.x += this.speedX
                this.y += this.speedY
            }

            draw() {
                ctx.fillStyle = this.color
                ctx.beginPath()
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2)
                ctx.fill()
            }
        }

        function init() {
            for (let i = 0; i < 400; i++) {
                particles.push(new Particle())
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height)

            particles.forEach(p => {
                p.update()
                p.draw()
            })

            requestAnimationFrame(animate)
        }

        init()
        animate()
    </script>

</body>

</html>
