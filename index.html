<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAICON E TALITA</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at center, #020024, #090979, #000);
    overflow:hidden;
    color:white;
}

/* Glow animado de fundo */
body::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background: radial-gradient(circle, rgba(0,255,255,0.3), transparent);
    filter: blur(120px);
    animation: pulse 5s infinite alternate;
}

@keyframes pulse{
    from{transform: scale(1);}
    to{transform: scale(1.3);}
}

.container{
    text-align:center;
    z-index:1;
}

/* Roleta */
.wheel{
    width:300px;
    height:300px;
    border-radius:50%;
    border:4px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(15px);
    background: conic-gradient(
        #00f2ff 0deg 60deg,
        #ff00c8 60deg 120deg,
        #00ff9d 120deg 180deg,
        #ff9d00 180deg 240deg,
        #8a2be2 240deg 300deg,
        #ff0055 300deg 360deg
    );
    box-shadow: 0 0 30px rgba(0,255,255,0.6),
                inset 0 0 40px rgba(255,255,255,0.2);
    transition: transform 4s cubic-bezier(.17,.67,.32,1.34);
}

/* Ponteiro */
.pointer{
    width:0;
    height:0;
    border-left:15px solid transparent;
    border-right:15px solid transparent;
    border-bottom:30px solid #00f2ff;
    margin:0 auto -10px;
    filter: drop-shadow(0 0 10px #00f2ff);
}

/* Botão */
button{
    margin-top:30px;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background: rgba(0,255,255,0.2);
    color:white;
    font-size:16px;
    cursor:pointer;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 15px rgba(0,255,255,0.6);
    transition: 0.3s;
}

button:hover{
    background: rgba(0,255,255,0.5);
}

/* Resultado */
.result{
    margin-top:20px;
    font-size:20px;
    text-shadow:0 0 10px #00f2ff;
}
</style>
</head>

<body>

<div class="container">
    <div class="pointer"></div>
    <div class="wheel" id="wheel"></div>

    <button onclick="spin()">GIRAR</button>

    <div class="result" id="result">Resultado: -</div>
</div>

<script>
const wheel = document.getElementById("wheel");
const result = document.getElementById("result");

const options = [
    "Prêmio 1",
    "Prêmio 2",
    "Prêmio 3",
    "Prêmio 4",
    "Prêmio 5",
    "Prêmio 6"
];

let rotation = 0;

function spin(){
    const extra = Math.floor(Math.random() * 360);
    const spins = 5 * 360; // rotação completa
    rotation += spins + extra;

    wheel.style.transform = `rotate(${rotation}deg)`;

    setTimeout(() => {
        const deg = rotation % 360;
        const index = Math.floor((360 - deg) / (360 / options.length)) % options.length;
        result.innerText = "Resultado: " + options[index];
    }, 4000);
}
</script>

</body>
</html>
